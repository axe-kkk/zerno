<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система обліку зерна - Вхід</title>
    <link rel="icon" type="image/svg+xml" href="static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="static/css/style.css?v=220">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo logo-vertical">
                    <span class="logo-icon">🌾</span>
                    <span class="logo-text">
                        <span class="logo-title">Система</span>
                        <span class="logo-subtitle">обліку зерна</span>
                    </span>
                </div>
                <p class="login-subtitle">Введіть облікові дані для входу</p>
            </div>
            
            <form id="login-form" class="login-form">
                <div id="error-message" class="error-message hidden"></div>
                
                <div class="form-group">
                    <label for="username">Ім'я користувача</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Введіть ім'я користувача"
                        required
                        autocomplete="username"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Введіть пароль"
                            required
                            autocomplete="current-password"
                        >
                        <button 
                            type="button" 
                            class="password-toggle" 
                            id="password-toggle"
                            aria-label="Показати пароль"
                        >
                            <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-icon eye-closed hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-login" id="login-btn">
                    <span class="btn-text">Увійти</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>
        </div>
    </div>
    <div class="toast-container" id="toast-container"></div>
    
    <script src="static/js/auth.js?v=3"></script>
</body>
</html>
